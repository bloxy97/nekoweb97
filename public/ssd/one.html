<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>It's rude to look when someone isn't ready.</title>
    <!-- The style.css file allows you to change the look of your web pages.
         If you include the next line in all your web pages, they will all share the same look.
         This makes it easier to make new pages for your site. -->
    <link href="\ssd.css" rel="stylesheet" type="text/css" media="all">
  </head>
  <body onload="setPanel()">
    This page uses javascript! it won't work without it.
    <div class="viewer">
        <img id="panel" src="/">
    </div>
   <div class="controls">
    <img id="back" onclick="back()" src="/images/noless.png">
    <img id="forward" onclick="forward()" src="/images/welcomegirlie.png">
   </div>
    <script>
           //set first panel 
           let panelNumber = 1;

           //set file path chunks
           const start = '/ssd/img/one/panel'
           const end = '.png'

           //set max panel (do this please)
           const maxPanel = 3
           //set img
           const fw = document.getElementById('forward');
           const bk = document.getElementById('back');

           //reload panel
           function setPanel() {
            const png = document.getElementById('panel');
            png.src = start.concat(panelNumber.toString(),end); 
           }

           //move forward
           function forward() {
            panelNumber += 1;
            bk.src = '/images/byebye.png'
            if (panelNumber >= maxPanel)  {
                panelNumber = maxPanel
                fw.src = '/ssd/img/nomore.png'
            }
            else {
                fw.src = '/images/welcomegirlie.png'
            }
            setPanel();
           }

           //move back
           function back() {
            panelNumber -= 1;
            fw.src = '/images/welcomegirlie.png'
            if (panelNumber <= 1)  {
                panelNumber = 1
                bk.src = '/ssd/img/noless.png'
            }
            else {
                bk.src = '/images/byebye.png'
            }
            setPanel();
           }
    </script>
  </body>
</html>
